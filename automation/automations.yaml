- alias: Night Mode by time on
  initial_state: 'on'
  trigger:
  - at: '22:00:00'
    platform: time
  action:
    - service: input_boolean.turn_on
      data:
        entity_id: input_boolean.night_mode

- alias: Night Mode by time off
  initial_state: 'on'
  trigger:
  - at: '06:00:00'
    platform: time
  action:
    - service: input_boolean.turn_off
      data:
        entity_id: input_boolean.night_mode

