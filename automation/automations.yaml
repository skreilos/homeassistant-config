- alias: PlayEssenSoundIfOff
  initial_state: 'on'
  trigger:
    platform: state
    entity_id:  light.gruppe_essenlicht
    to: 'on'
  condition:
    condition: state
    entity_id: media_player.wohnzimmertv
    state: 'paused'
  action:
  - service: media_player.select_source
    data_template:
      entity_id: media_player.wohnzimmertv
      source: POP
  - service: media_player.volume_set
    data_template:
      entity_id: 
      - media_player.wohnzimmertv
      volume_level: 0.04
  - service: media_player.volume_set
    data_template:
      entity_id: 
      - media_player.esszimmer
      volume_level: 0.02
  id: c145ghz7H0cc567sb0b1d87c28edsefg

- alias: PlaySofaSoundIfOff
  initial_state: 'on'
  trigger:
    platform: state
    entity_id:  light.gruppe_wohnzimmerlicht
    to: 'on'
  condition:
    condition: state
    entity_id: media_player.wohnzimmertv
    state: 'paused'
  action:
  - service: media_player.select_source
    data_template:
      entity_id: media_player.wohnzimmertv
      source: JAZZ
  - service: media_player.volume_set
    data_template:
      entity_id: 
      - media_player.esszimmer
      volume_level: 0.05
  - service: media_player.volume_set
    data_template:
      entity_id: 
      - media_player.wohnzimmertv
      volume_level: 0.04
  id: c145ghz7H0cc48asb0b1d87c28edsefg


