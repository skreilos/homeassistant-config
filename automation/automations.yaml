- alias: Definiere Tageslicht aus
  initial_state: 'on'
  trigger:
    platform: sun
    event: sunset
    offset: "00:10:00"
  action:
    - service: input_boolean.turn_off
      data:
        entity_id: input_boolean.tageslicht
    - service: input_number.set_value
      data:
        entity_id: input_number.brightness_autoLight
        value: 150
  id: 323e900sf45fffb7871a18750297c69f

- alias: Definiere Tageslicht an
  initial_state: 'on'
  trigger:
    platform: sun
    event: sunrise
    offset: "-00:10:00"
  action:
    - service: input_boolean.turn_on
      data:
        entity_id: input_boolean.tageslicht
    - service: input_number.set_value
      data:
        entity_id: input_number.brightness_autoLight
        value: 255
  id: 323e9a4df45fffb7871a18750297c69f


- alias: SMS Alarm Wohnraum Temperatur
  initial_state: 'on'
  trigger:
    platform: numeric_state
    entity_id: sensor.eg_temp_wohnraum_tv
    above: 35
    below: 99
  action:
  - service: rest_command.sms_twilio
    data:
      message: Achtung Wohnraum Temperatur stimmt nicht
      target: '+41795862755'
  id: c7e79599fca14153b276abed2fb1b3b0



- alias: Set theme at startup
  initial_state: 'on'
  trigger:
  - platform: homeassistant
    event: start
  action:
    service: frontend.set_theme
    data:
      name: theme-lion
  id: bf372ab629c746dea7388710ba2df012

- alias: Alarm on
  initial_state: 'on'
  trigger:
    platform: state
    entity_id: group.anwesenheit
    to: 'not_home'
  action:
    - service: input_boolean.turn_on
      data:
        entity_id: input_boolean.alarm_active
  id: 7bd4b9dc69c94e0fa763f648a874b217


- alias: Alarm on by time
  initial_state: 'on'
  trigger:
  - at: '21:00:00'
    platform: time
  action:
    - service: input_boolean.turn_on
      data:
        entity_id: input_boolean.alarm_active
  id: 7bd4b9ddfghjk12fa763f648a874b217

- alias: Alarm off by time
  initial_state: 'on'
  trigger:
  - at: 07:00:00
    platform: time
  condition:
    condition: state
    entity_id: group.anwesenheit
    state: 'home'
  action:
    - service: input_boolean.turn_off
      data:
        entity_id: input_boolean.alarm_active
  id: 7bd4b9ddfghjk12fa763f612a3456217

- alias: Alarm off
  initial_state: 'on'
  trigger:
    platform: state
    entity_id: group.anwesenheit
    to: 'home'
  action:
    - service: input_boolean.turn_off
      data:
        entity_id: input_boolean.alarm_active
    - service: script.turn_off
      entity_id: script.auto_licht_wohnzimmer
    - service: script.turn_off
      entity_id: script.auto_licht_schlafzimmer
  id: 7bd4b9ec64c94e0fa321f648a874b217

