################################################ Auto Licht Büro ####
- alias: Licht Büro an
  initial_state: true
  trigger:
    platform: state
    entity_id: binary_sensor.buro
    to: 'on'
  action:
  - service: homeassistant.turn_on
    entity_id: light.gruppe_buro_decke
  id: '6AC001'

- alias: Licht Büro aus
  initial_state: true
  trigger:
    platform: state
    entity_id: binary_sensor.buro
    to: 'off'
    for:
      seconds: 300
  action:
  - service: homeassistant.turn_off
    entity_id: light.gruppe_buro_decke
  id: '6AC002'

################################################ Auto Licht Büro Shelly Test ####
- alias: Licht Büro an Shelly Test
  initial_state: true
  trigger:
    platform: state
    entity_id: binary_sensor.shellymotionmqtt_60a423992c8cmotiondetected
    to: 'on'
  action:
  - service: homeassistant.turn_on
    entity_id: switch.bett_links

- alias: Licht Büro aus Shelly Test
  initial_state: true
  trigger:
    platform: state
    entity_id: binary_sensor.shellymotionmqtt_60a423992c8cmotiondetected
    to: 'off'
    for:
      minutes: 60
  action:
  - service: homeassistant.turn_off
    entity_id: switch.bett_links


- alias: 'MS-OG-EZ-Bett-Links-Ein-Einzeln2'
  initial_state: true
  trigger:
    - platform: state
      entity_id: switch.bett_links
      to: 'off'
    - platform: state
      entity_id: switch.bett_rechts
      to: 'off'
    - platform: state
      entity_id: media_player.samsungtv
      to: 'on'
  condition:
    condition: state
    entity_id: light.gruppe_wohnzimmerlicht
    state: 'on'
  action:
    - service: input_select.select_option
      data:
        entity_id: input_select.wohnraum_light_scene
        option: scene.wenig
