################################################ Auto Licht Essraum Rest ####
- alias: Reset Manual Activation
  trigger:
    platform: state
    entity_id: input_select.wohnraum_light_scene
    to: "scene.wohnraum_aus"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.manual_activation_wohnraum

################################################ Auto Licht Wohnraum ####
- alias: Wohnraum Licht Scene Select
  trigger:
    platform: state
    entity_id: input_select.wohnraum_light_scene
  action:
    service: scene.turn_on
    data_template:
      entity_id: >
        {{ states('input_select.wohnraum_light_scene') }}

- alias: Licht Wohnraum an motion
  initial_state: true
  trigger:
    - platform: state
      entity_id: group.motion_wohnraum
      to: 'on'
  condition:
#    - condition: numeric_state
#      entity_id: sensor.essraum
#      below: 330
    - condition: state
      entity_id: input_boolean.manual_activation_essraum
      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.wohnraum_wenig

- alias: Licht Wohnraum aus
  initial_state: true
  trigger:
    - platform: state
      entity_id: group.motion_wohnraum
      to: 'off'
      for:
        minutes: 3
#  condition:
#    - condition: state
#      entity_id: light.gruppe_essraumlicht
#      state: 'on'
#    - condition: state
#      entity_id: input_boolean.manual_activation_essraum
#      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.wohnraum_aus

        
################################################ Auto Licht Essraum ####
- alias: Licht Essraum an Motion
  initial_state: true
  trigger:
    - platform: state
      entity_id: binary_sensor.essraum
      to: 'on'
  condition:
    - condition: numeric_state
      entity_id: sensor.essraum
      below: 330
    - condition: state
      entity_id: input_boolean.manual_activation_essraum
      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.essen_mittel

- alias: Licht Essraum an
  initial_state: true
  trigger:
    - platform: state
      entity_id: binary_sensor.essraum
      to: 'on'
  condition:
    - condition: state
      entity_id: light.gruppe_essraumlicht
      state: 'on'
    - condition: state
      entity_id: input_boolean.manual_activation_essraum
      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.essen_an

- alias: Licht EG Essraum aus
  initial_state: true
  trigger:
    - platform: state
      entity_id: binary_sensor.essraum
      to: 'off'
      for:
        minutes: 3
  condition:
    - condition: state
      entity_id: input_boolean.manual_activation_essraum
      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.essen_aus

################################################ Auto Licht Essraum ####
- alias: Essraum Licht Scene Select
  trigger:
    platform: state
    entity_id: input_select.essraum_light_scene
  action:
    service: scene.turn_on
    data_template:
      entity_id: >
        {{ states('input_select.essraum_light_scene') }}

################################################ Auto Licht Essraum Rest ####
- alias: Reset Manual Activation
  trigger:
    platform: state
    entity_id: input_select.essraum_light_scene
    to: "scene.essen_aus"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.manual_activation_essraum

################################################ Auto Licht Schlafzimmer Stephan ####
- alias: Licht Schlafzimmer Stephan an
  initial_state: true
  trigger:
    - platform: state
      entity_id: group.motion_schlafzimmer_stephan
      to: 'on'
  condition:
    - condition: state
      entity_id: input_boolean.manual_activation_schlafzimmer_stephan
      state: 'off'
#    - condition: numeric_state
#      entity_id: group.motion_schlafzimmer_stephan
#      below: 330
  action:
    - alias: "Turn on front lights if motion detected, else turn off"
      choose:
        - alias: "Night Mode on"
          conditions:
            - condition: state
              entity_id: input_boolean.night_mode
              state: 'on'
        # "{{ input_boolean.night_mode.state == 'on' }}"
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.schlafzimmer_stephan_wenig
      default:
        - service: scene.turn_on
          target:
            entity_id: scene.schlafzimmer_stephan_mittel



- alias: Licht Schlafzimmer Stephan an
  initial_state: true
  trigger:
    - platform: state
      entity_id: group.motion_schlafzimmer_stephan
      to: 'on'
  condition:
    - condition: state
      entity_id: light.gruppe_schlafzimmer_stephan_licht
      state: 'on'
    - condition: state
      entity_id: input_boolean.manual_activation_schlafzimmer_stephan
      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.schlafzimmer_stephan_mittel

- alias: Licht Schlafzimmer Stephan aus
  initial_state: true
  trigger:
    - platform: state
      entity_id: group.motion_schlafzimmer_stephan
      to: 'off'
      for:
        minutes: 1
  condition:
    - condition: state
      entity_id: light.gruppe_schlafzimmer_stephan_licht
      state: 'on'
    - condition: state
      entity_id: input_boolean.manual_activation_schlafzimmer_stephan
      state: 'off'
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.schlafzimmer_stephan_aus

