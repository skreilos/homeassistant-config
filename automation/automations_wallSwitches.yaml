  initial_state: true
  trigger:
    platform: event
    event_type: deconz_event
    event_data:
      unique_id: 00:15:8d:00:02:c9:3a:4a
      event: 2002
  condition:
    - condition: state
      entity_id: input_boolean.manual_activation_essraum
      state: 'off'
  action:
    - service: input_select.select_next
      entity_id: input_select.essraum_light_scene
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.manual_activation_essraum

- alias: 'WS-WR-Einzeln_Rechts'
  initial_state: true
  trigger:
