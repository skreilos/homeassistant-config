#### wandschalter_wohnraum ####
- alias: 'WS-WR-Einzeln_Links'
  initial_state: true
  trigger:
    platform: event
    event_type: deconz_event
    event_data:
      unique_id: 00:15:8d:00:02:c9:3a:4a
      event: 1002
#  condition:
#    - condition: state
#      entity_id: input_boolean.manual_activation_wohnraum
#      state: 'off'
  action:
    - service: input_select.select_next
      entity_id: input_select.wohnraum_light_scene
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.manual_activation_wohnraum

- alias: 'WS-WR-Doppelt_Links'
  initial_state: true
  trigger:
    platform: event
    event_type: deconz_event
    event_data:
      unique_id: 00:15:8d:00:02:c9:3a:4a
      event: 1004
  action:
    - service: light.turn_on
      data_template:
        entity_id: light.gruppe_wohnraumlicht
        brightness: >
          {% set bri = states.light.gruppe_wohnraumlicht.attributes.brightness | int %}
          {{ [bri+50, 249] | min }}

- alias: 'WS-WR-Lange_Links'
  initial_state: true
  trigger:
    platform: event
    event_type: deconz_event
    event_data:
      unique_id: 00:15:8d:00:02:c9:3a:4a
      event: 1001
  action:
    - service: light.turn_on
      data_template:
        entity_id: light.gruppe_wohnraumlicht
        brightness: >
          {% set bri = states.light.gruppe_wohnraumlicht.attributes.brightness | int %}
          {{ [bri-50, 0] | max }}

