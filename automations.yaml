- id: '1668931799898'
  alias: Auto Light - Küche V2
  description: ''
  trigger:
  - type: motion
    platform: device
    device_id: 51879b5d5dac01662aa2fc857af1aa6a
    entity_id: 9ba0ab2e14add997aba2920326a990bc
    domain: binary_sensor
    id: Motion Küche On
  - type: no_motion
    platform: device
    device_id: 51879b5d5dac01662aa2fc857af1aa6a
    entity_id: 9ba0ab2e14add997aba2920326a990bc
    domain: binary_sensor
    id: Motion Küche Off
    for:
      hours: 0
      minutes: 2
      seconds: 0
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Motion Küche On
      - type: is_illuminance
        condition: device
        device_id: 51879b5d5dac01662aa2fc857af1aa6a
        entity_id: 2727f4c60cd15af34090663bd6eb8bd3
        domain: sensor
        below: 180
      sequence:
      - service: light.turn_on
        data:
          brightness_pct: >
            {% set start_s = states('input_datetime.night_auto_light_start') %}
            {% set end_s = states('input_datetime.night_auto_light_end') %}
            {% set invalid = ['unknown', 'unavailable', 'none', ''] %}
            {% if start_s in invalid or end_s in invalid %}
              {% set in_night = false %}
            {% else %}
              {% set start = today_at(start_s) %}
              {% set end = today_at(end_s) %}
              {% if end <= start %}
                {% set in_night = now() >= start or now() < end %}
              {% else %}
                {% set in_night = now() >= start and now() < end %}
              {% endif %}
            {% endif %}
            {{ states('input_number.night_brightness_kuche') | int if (in_night and is_state('input_boolean.guest_mode', 'off')) else 100 }}
        target:
          area_id: kuche
      - choose:
        - conditions:
          - condition: template
            value_template: >
              {% set start_s = states('input_datetime.night_auto_light_start') %}
              {% set end_s = states('input_datetime.night_auto_light_end') %}
              {% set invalid = ['unknown', 'unavailable', 'none', ''] %}
              {% if start_s in invalid or end_s in invalid %}
                {% set in_night = false %}
              {% else %}
                {% set start = today_at(start_s) %}
                {% set end = today_at(end_s) %}
                {% if end <= start %}
                  {% set in_night = now() >= start or now() < end %}
                {% else %}
                  {% set in_night = now() >= start and now() < end %}
                {% endif %}
              {% endif %}
              {{ (not in_night) or is_state('input_boolean.guest_mode', 'on') }}
          sequence:
          - service: switch.turn_on
            data: {}
            target:
              device_id: d2d23f11b7df2716b0ce4fb7a1acf235
    - conditions:
      - condition: trigger
        id:
        - Motion Küche Off
      sequence:
      - service: light.turn_off
        data: {}
        target:
          area_id: kuche
      - service: switch.turn_off
        data: {}
        target:
          device_id: d2d23f11b7df2716b0ce4fb7a1acf235
  mode: single
- id: '1761513800001'
  alias: Nachtlimit Deckenlicht Zimmer
  description: Begrenze manuell eingeschaltete Deckenlichter nachts auf definierte Helligkeit
  triggers:
  - entity_id:
    - light.stefan_deckenlicht_light_3
    - light.deckenlicht_zimmer_julian_light
    - light.zimmer_joshua_deckenlicht_light
    - switch.sh_schlafzimmer_stephan_switch_0
    - switch.sh_schlafzimmer_kinder_switch_0
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - variables:
      target_light: >
        {% if trigger.entity_id in ['light.stefan_deckenlicht_light_3', 'switch.sh_schlafzimmer_stephan_switch_0'] %}
          light.stefan_deckenlicht_light_3
        {% elif trigger.entity_id in ['light.zimmer_joshua_deckenlicht_light', 'switch.sh_schlafzimmer_kinder_switch_0'] %}
          light.zimmer_joshua_deckenlicht_light
        {% else %}
          light.deckenlicht_zimmer_julian_light
        {% endif %}
      night_pct: >
        {% if target_light == 'light.stefan_deckenlicht_light_3' %}
          {{ states('input_number.night_brightness_decke_stephan') | int }}
        {% elif target_light == 'light.deckenlicht_zimmer_julian_light' %}
          {{ states('input_number.night_brightness_decke_julian') | int }}
        {% elif target_light == 'light.zimmer_joshua_deckenlicht_light' %}
          {{ states('input_number.night_brightness_decke_joshua') | int }}
        {% else %}
          20
        {% endif %}
      start_entity: >
        {% if target_light == 'light.stefan_deckenlicht_light_3' %}
          input_datetime.night_auto_light_start_stephan
        {% elif target_light == 'light.deckenlicht_zimmer_julian_light' %}
          input_datetime.night_auto_light_start_julian
        {% elif target_light == 'light.zimmer_joshua_deckenlicht_light' %}
          input_datetime.night_auto_light_start_joshua
        {% else %}
          input_datetime.night_auto_light_start
        {% endif %}
      end_entity: >
        {% if target_light == 'light.stefan_deckenlicht_light_3' %}
          input_datetime.night_auto_light_end_stephan
        {% elif target_light == 'light.deckenlicht_zimmer_julian_light' %}
          input_datetime.night_auto_light_end_julian
        {% elif target_light == 'light.zimmer_joshua_deckenlicht_light' %}
          input_datetime.night_auto_light_end_joshua
        {% else %}
          input_datetime.night_auto_light_end
        {% endif %}
      in_night: >
        {% set start_s = states(start_entity | trim) %}
        {% set end_s = states(end_entity | trim) %}
        {% set invalid = ['unknown', 'unavailable', 'none', ''] %}
        {% if start_s in invalid or end_s in invalid %}
          false
        {% else %}
          {% set start = today_at(start_s) %}
          {% set end = today_at(end_s) %}
          {% if end <= start %}
            {{ now() >= start or now() < end }}
          {% else %}
            {{ now() >= start and now() < end }}
          {% endif %}
        {% endif %}
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ in_night | bool and is_state('input_boolean.guest_mode', 'off') }}"
      sequence:
      - target:
          entity_id: "{{ target_light }}"
        data:
          brightness_pct: "{{ night_pct | int }}"
          transition: 1
        action: light.turn_on
  mode: queued
  max: 10
