# DEPRECATED: customize.yaml is no longer used in this project.
#
# Background:
# - This file was historically used to override `friendly_name`.
# - It was never loaded by `configuration.yaml` (no
#   `homeassistant: { customize: !include customize.yaml }` block).
# - In Home Assistant 2026 the entity registry is the single source of truth
#   for display names; `friendly_name` overrides from `customize.yaml` are
#   ignored by many frontend dialogs.
#
# All historic overrides have been migrated to
#   ./entity_friendly_name_map.yaml
# and are applied to the entity/device registry via:
#   scripts/apply_entity_friendly_names.py
#   scripts/apply_device_names.py
#
# Keep this file empty so existing references in older docs don't crash.
