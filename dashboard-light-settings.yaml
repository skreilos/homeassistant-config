title: Licht Einstellungen
views:
  - title: Licht Einstellungen
    path: licht-einstellungen
    icon: mdi:lightbulb-auto
    cards:
      - type: entities
        title: Nachtzeiten Deckenlicht Zimmer
        show_header_toggle: false
        entities:
          - entity: input_datetime.night_mode_kids_start
            name: Night Mode Kinder Ein
          - entity: input_datetime.night_mode_kids_end
            name: Night Mode Kinder Aus
          - entity: input_datetime.night_auto_light_start_stephan
            name: Nacht Start Stephan
          - entity: input_datetime.night_auto_light_end_stephan
            name: Nacht Ende Stephan
          - entity: input_datetime.night_auto_light_start_julian
            name: Nacht Start Julian
          - entity: input_datetime.night_auto_light_end_julian
            name: Nacht Ende Julian
          - entity: input_datetime.night_auto_light_start_joshua
            name: Nacht Start Joshua
          - entity: input_datetime.night_auto_light_end_joshua
            name: Nacht Ende Joshua
          - entity: input_boolean.guest_mode
            name: Gästemodus
      - type: entities
        title: Auto-Light Tageszeiten Kinderzimmer
        show_header_toggle: false
        entities:
          - entity: input_datetime.kids_home_auto_light_start_julian
            name: Auto-Light Julian Start
          - entity: input_datetime.kids_home_auto_light_end_julian
            name: Auto-Light Julian Ende
          - entity: input_datetime.kids_home_auto_light_start_joshua
            name: Auto-Light Joshua Start
          - entity: input_datetime.kids_home_auto_light_end_joshua
            name: Auto-Light Joshua Ende
      - type: entities
        title: Helligkeit je Bereich
        show_header_toggle: false
        entities:
          - entity: input_number.day_brightness_sofa
            name: Licht Wohnzimmer Sofa Tag
          - entity: input_number.day_brightness_decke_stephan
            name: Licht Schlafzimmer Stephan Decke Tag
          - entity: input_number.night_brightness_sofa
            name: Licht Wohnzimmer Sofa Nacht
          - entity: input_number.night_brightness_esstisch
            name: Licht Essraum Nacht
          - entity: input_number.night_brightness_kuche
            name: Licht Küche Nacht
      - type: entities
        title: Nacht Helligkeit Deckenlichter
        show_header_toggle: false
        entities:
          - entity: input_number.night_brightness_decke_stephan
            name: Licht Schlafzimmer Stephan Decke Nacht
          - entity: input_number.night_brightness_decke_julian
            name: Licht Zimmer Julian Decke Nacht
          - entity: input_number.night_brightness_decke_joshua
            name: Licht Zimmer Joshua Decke Nacht
      - type: entities
        title: Auto-Light Lux Schwellen
        show_header_toggle: false
        entities:
          - entity: input_number.auto_light_lux_threshold_kuche
            name: Küche Schwelle
          - entity: input_number.auto_light_lux_threshold_essraum
            name: Essraum Schwelle
          - entity: input_number.auto_light_lux_threshold_sofa
            name: Wohnzimmer Sofa Schwelle
          - entity: input_number.auto_light_lux_threshold_schlafzimmer_stephan
            name: Schlafzimmer Stephan Schwelle
          - entity: input_number.auto_light_lux_threshold_julian
            name: Zimmer Julian Schwelle
          - entity: input_number.auto_light_lux_threshold_joshua
            name: Zimmer Joshua Schwelle
      - type: entities
        title: Aktuelle Lux Bewegungsmelder
        show_header_toggle: false
        entities:
          - entity: sensor.motion_gang_kuche_illuminance_9
            name: Küche
          - entity: sensor.motion_esstisch_illuminance_4
            name: Essraum
          - entity: sensor.lumi_lumi_sensor_motion_aq2_illuminance_2
            name: Wohnzimmer Sofa
          - entity: sensor.lumi_lumi_sensor_motion_aq2_illuminance
            name: Schlafzimmer Stephan rechts
          - entity: sensor.lumi_lumi_sensor_motion_aq2_illuminance_8
            name: Schlafzimmer Stephan links
          - entity: sensor.lumi_lumi_sensor_motion_aq2_illuminance_9
            name: Zimmer Julian
          - entity: sensor.motion_schlafzimmer_kinder_illuminance_9
            name: Zimmer Joshua
