title: Licht Einstellungen
views:
  - title: Licht Einstellungen
    path: licht-einstellungen
    icon: mdi:lightbulb-auto
    cards:
      - type: entities
        title: Nacht Auto-Licht
        show_header_toggle: false
        entities:
          - entity: input_datetime.night_auto_light_start
            name: Nachtmodus Start
          - entity: input_datetime.night_auto_light_end
            name: Nachtmodus Ende
          - entity: input_boolean.night_special_dimming_enabled
            name: Spezial-Dimmung aktiv
      - type: entities
        title: Helligkeit je Bereich
        show_header_toggle: false
        entities:
          - entity: input_number.night_brightness_sofa
            name: Sofa
          - entity: input_number.night_brightness_esstisch
            name: Essraum
          - entity: input_number.night_brightness_kuche
            name: Küche
      - type: entities
        title: Nacht Helligkeit Deckenlichter
        show_header_toggle: false
        entities:
          - entity: input_number.night_brightness_decke_stephan
            name: Zimmer Stephan
          - entity: input_number.night_brightness_decke_julian
            name: Zimmer Julian
          - entity: input_number.night_brightness_decke_joshua
            name: Zimmer Joshua
