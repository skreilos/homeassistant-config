title: Licht Einstellungen
views:
  - title: Licht Einstellungen
    path: licht-einstellungen
    icon: mdi:lightbulb-auto
    cards:
      - type: entities
        title: Nachtzeiten Deckenlicht Zimmer
        show_header_toggle: false
        entities:
          - entity: input_datetime.night_auto_light_start_stephan
            name: Nacht Start Stephan
          - entity: input_datetime.night_auto_light_end_stephan
            name: Nacht Ende Stephan
          - entity: input_datetime.night_auto_light_start_julian
            name: Nacht Start Julian
          - entity: input_datetime.night_auto_light_end_julian
            name: Nacht Ende Julian
          - entity: input_datetime.night_auto_light_start_joshua
            name: Nacht Start Joshua
          - entity: input_datetime.night_auto_light_end_joshua
            name: Nacht Ende Joshua
          - entity: input_boolean.night_mode
            name: Night Mode
          - entity: input_boolean.guest_mode
            name: Gästemodus
      - type: entities
        title: Helligkeit je Bereich
        show_header_toggle: false
        entities:
          - entity: input_number.night_brightness_sofa
            name: Licht Wohnzimmer Sofa Nacht
          - entity: input_number.night_brightness_esstisch
            name: Licht Essraum Nacht
          - entity: input_number.night_brightness_kuche
            name: Licht Küche Nacht
      - type: entities
        title: Nacht Helligkeit Deckenlichter
        show_header_toggle: false
        entities:
          - entity: input_number.night_brightness_decke_stephan
            name: Licht Schlafzimmer Stephan Decke Nacht
          - entity: input_number.night_brightness_decke_julian
            name: Licht Zimmer Julian Decke Nacht
          - entity: input_number.night_brightness_decke_joshua
            name: Licht Zimmer Joshua Decke Nacht
