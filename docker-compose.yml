services:
  home-assistant:
    image: homeassistant/home-assistant:latest
    container_name: home-assistant
    restart: always
    ports:
      - "8123:8123"
      - "5683:5683/udp"
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    volumes:
      - /data/home-assistant:/config
      - /etc/letsencrypt:/certs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true
